<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adoption Application</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #fdf6ec 0%, #f4e4d0 100%);
      margin: 0;
      padding: 40px 20px;
      color: #3d3528;
      line-height: 1.6;
    }

    .form-container {
      max-width: 640px;
      margin: 0 auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #b6663a;
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 32px;
    }

    .intro {
      color: #6b5e4d;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #4a3f30;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d9cfc0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #fdfaf5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #b6663a;
      box-shadow: 0 0 0 3px rgba(182, 102, 58, 0.15);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      background: #b6663a;
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    button:hover {
      background: #9a542d;
    }

    .section-heading {
      margin-top: 32px;
      margin-bottom: 16px;
      color: #b6663a;
      font-size: 18px;
      border-bottom: 2px solid #f4e4d0;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Adoption Application</h1>
    <p class="intro">Thank you for considering adoption! Please fill out the form below and we'll be in touch soon.</p>

    <form>
      <h2 class="section-heading">Your Information</h2>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" required>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" name="address" required>
      </div>

      <h2 class="section-heading">About You</h2>

      <div class="form-group">
        <label for="about">Tell us a little about yourself and why you'd like to adopt</label>
        <textarea id="about" name="about" required></textarea>
      </div>

      <button type="submit">Submit Application</button>
    </form>
  </div>
</body>
</html>
